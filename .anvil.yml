version: 1
checkout:
  depth: 1
run:
  workingDirectory: .
  timeoutSeconds: 720
  steps:
    - name: install
      run: npm ci
    - name: generate types
      run: npm run types:generate
    - name: typecheck
      run: npm run typecheck
    - name: vitest
      run: npm test
    - name: build
      run: npm run build
