<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bland</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-[#09090b] text-zinc-100 antialiased">
    <div id="root"></div>
    <script>
      // via https://github.com/j4rviscmd/Scripta/pull/53/changes
      // Workaround for https://github.com/ueberdosis/tiptap/issues/5450
      // Must run before Vite pre-bundled chunks capture console.warn
      (() => {
        const _warn = console.warn;
        console.warn = (...args) => {
          const msg = typeof args[0] === "string" ? args[0] : "";
          if (msg.startsWith("linkifyjs: already initialized")) return;
          _warn.apply(console, args);
        };
      })();
    </script>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
