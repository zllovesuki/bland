<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bland</title>
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#171717" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Outfit:wght@400..700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-canvas text-zinc-100 antialiased">
    <div id="root"></div>
    <script>
      // via https://github.com/j4rviscmd/Scripta/pull/53/changes
      // Workaround for https://github.com/ueberdosis/tiptap/issues/5450
      // Must run before Vite pre-bundled chunks capture console.warn
      (() => {
        const _warn = console.warn;
        console.warn = (...args) => {
          const msg = typeof args[0] === "string" ? args[0] : "";
          if (msg.startsWith("linkifyjs: already initialized")) return;
          _warn.apply(console, args);
        };
      })();
    </script>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
